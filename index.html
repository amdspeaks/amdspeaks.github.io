<!DOCTYPE html>
<html>

<head>

    <!-- title of the website tab -->
    <title>Showcaser - Home</title>

    <!-- connects css file -->
    <link rel="stylesheet" href="style.css">

    <!-- icon library for the icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- sidebar/navigation menu -->
<nav class="sidebar collapsed" id="sidebar">

    <!-- hamburger button to open and close sidebar -->
    <button class="hamburger" onclick="toggleSidebar()">☰</button>

    <!-- logo section -->
    <div class="logo"></div>

    <!-- home button -->
    <a href="index.html" class="active">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </a>

    <!-- about page button -->
    <a href="about.html">
        <i class="fa-solid fa-circle-info"></i>
        <span>About</span>
    </a>

    <!-- games page button -->
    <a href="games.html">
        <i class="fa-solid fa-gamepad"></i>
        <span>Games</span>
    </a>

    <!-- reviews page button -->
    <a href="reviews.html">
        <i class="fa-solid fa-star"></i>
        <span>Reviews</span>
    </a>

</nav>

<!-- main hero section -->
<section class="hero">

    <!-- main logo image -->
    <img src="logo (2).png" alt="Showcaser Logo" class="hero-logo">

    <!-- main heading -->
    <h2>Game Reviews & Showcases</h2>

    <!-- short description -->
    <p>
        Exploring worlds, reviewing games, and showcasing experiences.
    </p>

    <!-- button that goes to reviews page -->
    <a href="reviews.html" class="button">
        Read Reviews
    </a>

</section>

<script>

    // function for sidebar opening and closing
    function toggleSidebar() {

        // toggles collapsed class
        document.getElementById("sidebar").classList.toggle("collapsed");
    }

</script>

<!-- footer -->
<footer>
    © 2026 Showcaser — Built by Andrew Miguel
</footer>

</body>
</html>
